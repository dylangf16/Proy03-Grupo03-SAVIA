<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SAVIA · Mi maceta</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Sora:wght@400;500;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/mimaceta.css" />
</head>
<body>
  <div class="app">

    <!-- Top navigation -->
    <nav class="topbar">
      <div class="logo"></div>
      <div class="nav-tabs">
        <a class="tab" href="/#inicio">Inicio</a>
        <a class="tab active" href="/#tus-macetas">Tus macetas</a>
        <a class="tab" href="#" aria-disabled="true">Blog</a>
      </div>
      <div class="nav-right">
        <button class="icon-btn" aria-label="Favoritos">
          <span class="dot"></span>♡
        </button>
        <button class="profile-btn">Tu perfil</button>
      </div>
    </nav>

    <!-- Main card -->
    <section class="card">
      <div class="title-row">
        <h1 class="title">mi savia</h1>
        <span class="edit-icon">✎</span>
        <div id="conn" class="conn offline">
          <span class="led"></span><span id="connText">Sin conexión</span>
        </div>
      </div>
      <div class="subtitle">Pothos · maceta #1 <span class="edit-icon">✎</span></div>

      <!-- Render con las stats superpuestas a la derecha -->
      <div class="render">
        <span>RENDER AQUI</span>
        <div class="stats">
          <div class="stat">
            <div class="label">tanque</div>
            <div class="value"><span id="tankVal">--</span>%</div>
            <div class="bar"><i id="tankBar" class="c-orange"></i></div>
            <div id="tankStatus" class="status t-orange">--</div>
          </div>
          <div class="stat">
            <div class="label">luz</div>
            <div class="value"><span id="luxVal">--</span><small> lux</small></div>
            <div class="bar"><i id="luxBar" class="c-green"></i></div>
            <div id="luxStatus" class="status t-green">--</div>
          </div>
          <div class="stat">
            <div class="label">humedad</div>
            <div class="value"><span id="humVal">--</span>%</div>
            <div class="bar"><i id="humBar" class="c-red"></i></div>
            <div id="humStatus" class="status t-red">--</div>
          </div>
        </div>
      </div>

      <!-- Acciones debajo del render -->
      <div class="actions">
        <button id="btnRegar" class="btn btn-primary">Regar planta ahora</button>
        <button id="btnUmbrales" class="btn btn-outline">Ajustar umbrales</button>
      </div>

      <!-- Estado actual -->
      <div class="estado">
        <h2>Estado actual:</h2>
        <div id="estadoAlert" class="alert info">Conectando…</div>
        <p id="estadoMsg">Esperando datos del dispositivo.</p>
        <div class="timer">
          Riego automático cada: <b id="riegoTimer">--:--:--</b>
        </div>
      </div>
    </section>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <!-- Modal: Ajustar umbrales -->
  <div id="modalBack" class="modal-back">
    <div class="modal">
      <h3>Ajustar umbrales</h3>
      <div class="sub">Configura los rangos para tu maceta.</div>
      <div class="field row">
        <div>
          <label>Humedad mín (%)</label>
          <input id="inHumMin" type="number" step="1" />
        </div>
        <div>
          <label>Humedad máx (%)</label>
          <input id="inHumMax" type="number" step="1" />
        </div>
      </div>
      <div class="field row">
        <div>
          <label>Luz mín (lux)</label>
          <input id="inLuxMin" type="number" step="10" />
        </div>
        <div>
          <label>Luz máx (lux)</label>
          <input id="inLuxMax" type="number" step="10" />
        </div>
      </div>
      <div class="modal-actions">
        <button id="modalCancel" class="btn btn-outline">Cancelar</button>
        <button id="modalSave" class="btn btn-primary">Guardar</button>
      </div>
    </div>
  </div>

<script>
  const $ = (id) => document.getElementById(id);

  function setBar(barEl, pct, color) {
    barEl.style.width = (pct ?? 0) + "%";
    barEl.className = "c-" + color;
  }

  function setStatus(el, text, color) {
    el.textContent = text ?? "--";
    el.className = "status t-" + color;
  }

  function fmtTimer(totalSeconds) {
    if (totalSeconds == null) return "--:--:--";
    const h = Math.floor(totalSeconds / 3600);
    const m = Math.floor((totalSeconds % 3600) / 60);
    const s = Math.floor(totalSeconds % 60);
    return `${h}hrs / ${m}min / ${s} segundos`;
  }

  let countdown = null;

  function render(state) {
    // Conexión
    const conn = $("conn");
    conn.className = "conn " + (state.connected ? "online" : "offline");
    $("connText").textContent = state.connected
      ? "En línea" + (state.updated_at ? " · " + state.updated_at : "")
      : "Sin conexión";

    // Métricas
    $("humVal").textContent  = state.humedad.value ?? "--";
    setBar($("humBar"), state.humedad.bar, state.humedad.color);
    setStatus($("humStatus"), state.humedad.status, state.humedad.color);

    $("luxVal").textContent  = state.luz.value ?? "--";
    setBar($("luxBar"), state.luz.bar, state.luz.color);
    setStatus($("luxStatus"), state.luz.status, state.luz.color);

    $("tankVal").textContent = state.tanque.value ?? "--";
    setBar($("tankBar"), state.tanque.bar, state.tanque.color);
    setStatus($("tankStatus"), state.tanque.status, state.tanque.color);

    // Estado actual
    $("estadoAlert").textContent = state.estado.alert;
    $("estadoAlert").className = "alert " + state.estado.severity;
    $("estadoMsg").textContent = state.estado.message;

    // Botón regar: solo si necesita / tiene sentido
    $("btnRegar").disabled = !state.connected;

    // Contador
    countdown = state.auto_irrigation_remaining_s;
    $("riegoTimer").textContent = fmtTimer(countdown);

    // Pre-cargar umbrales en el modal
    if (state.thresholds) {
      $("inHumMin").value = state.thresholds.humedad_min;
      $("inHumMax").value = state.thresholds.humedad_max;
      $("inLuxMin").value = state.thresholds.luz_min;
      $("inLuxMax").value = state.thresholds.luz_max;
    }
  }

  async function poll() {
    try {
      const r = await fetch("/api/state", { cache: "no-store" });
      render(await r.json());
    } catch (e) {
      $("conn").className = "conn offline";
      $("connText").textContent = "Servidor no disponible";
    }
  }

  // Contador local que decrementa cada segundo entre polls
  setInterval(() => {
    if (countdown != null && countdown > 0) {
      countdown -= 1;
      $("riegoTimer").textContent = fmtTimer(countdown);
    }
  }, 1000);

  function toast(msg) {
    const t = $("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2600);
  }

  // Regar ahora
  $("btnRegar").addEventListener("click", async () => {
    try {
      await fetch("/api/irrigate", { method: "POST" });
      toast("💧 Riego solicitado");
      poll();
    } catch { toast("No se pudo enviar la orden"); }
  });

  // Modal umbrales
  $("btnUmbrales").addEventListener("click", () => $("modalBack").classList.add("open"));
  $("modalCancel").addEventListener("click", () => $("modalBack").classList.remove("open"));
  $("modalBack").addEventListener("click", (e) => {
    if (e.target === $("modalBack")) $("modalBack").classList.remove("open");
  });
  $("modalSave").addEventListener("click", async () => {
    const body = {
      humedad_min: parseFloat($("inHumMin").value),
      humedad_max: parseFloat($("inHumMax").value),
      luz_min: parseFloat($("inLuxMin").value),
      luz_max: parseFloat($("inLuxMax").value),
    };
    try {
      const res = await fetch("/api/thresholds", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      $("modalBack").classList.remove("open");
      if (data.arduino_forward && data.arduino_forward.sent) {
        toast("Umbrales actualizados y enviados al Arduino");
      } else {
        toast("Umbrales actualizados en servidor");
      }
      poll();
    } catch { toast("No se pudieron guardar los umbrales"); }
  });

  // Arranque
  poll();
  setInterval(poll, 2000);
</script>
</body>
</html>
